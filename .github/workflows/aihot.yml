name: 更新 RSS

on:
  schedule:
    - cron: "*/30 22-23,0-14 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: 生成 RSS
        run: python aihot_rss.py docs/aihot.xml

      - name: 提交更新
        run: |
          git config user.name "bot"
          git config user.email "bot@github.com"
          git add docs/aihot.xml
          git diff --staged --quiet || git commit -m "update RSS"
          git push
